version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused

formatters:
  enable:
    - gofmt
    - goimports

linters-settings:
  lll:
    line-length: 120

formatters-settings:
  goimports:
    local-prefixes:
      - github.com/fullstacks-gmbh/universal-airgapper
