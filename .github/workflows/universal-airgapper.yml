name: Universal Airgapper

on:
  workflow_call:
    inputs:
      job-name:
        description: "Job Name"
        default: "airgapper"
        required: false
        type: string
      image_registry:
        description: "Registry of the image to use"
        default: "ghcr.io"
        required: false
        type: string
      image_name:
        description: "Name of the image"
        default: "fullstacks-gmbh/universal-airgapper"
        required: false
        type: string
      image_tag:
        description: "Tag of the image"
        default: "latest"
        required: false
        type: string
      image_pull_policy:
        description: "Image pull policy"
        default: "always"
        required: false
        type: string
      config-folder:
        description: "Path to folder containing config files"
        required: false
        type: string
      debug:
        description: "Enable debug mode"
        default: ""
        required: false
        type: string
      credentials-secret-name:
        description: "Name of the secret containing the credentials"
        default: "UNIVERSAL_AIRGAPPER_CREDS"
        required: false
        type: string
    secrets:
      GHCR_PAT:
        required: true

jobs:
  airgapper:
    name: ${{ inputs.job-name || 'airgapper' }}
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.image_registry }}/${{ inputs.image_name }}:${{ inputs.image_tag }}
      options: --pull=${{ inputs.image_pull_policy || 'always' }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_PAT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show config files
        run: |
          CONFIG_FOLDER="${{ inputs.config-folder }}"
          if [ -z "$CONFIG_FOLDER" ]; then CONFIG_FOLDER="${GITHUB_WORKSPACE}"; fi
          echo "========================================================"
          echo "================ Universal Airgapper ==================="
          echo "====================== CONFIG =========================="
          cat "$CONFIG_FOLDER"/*.yaml || true
          echo "========================================================"

      - name: Write credentials file
        run: echo "${{ secrets[inputs.credentials-secret-name] }}" > credentials.yaml

      - name: Run Universal Airgapper
        run: |
          /airgapper sync \
            --config "${{ inputs.config-folder || github.workspace }}" \
            --credentials credentials.yaml ${{ inputs.debug }}
