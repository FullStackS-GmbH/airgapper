name: Universal Airgapper

on:
  workflow_call:
    inputs:
      job-name:
        description: "Job Name"
        default: "airgapper"
        required: false
        type: string
      image_registry:
        description: "Registry of the image to use"
        default: "ghcr.io"
        required: false
        type: string
      image_name:
        description: "Name of the image"
        default: "fullstacks-gmbh/airgapper"
        required: false
        type: string
      image_tag:
        description: "Tag of the image"
        default: "latest"
        required: false
        type: string
      image_pull_policy:
        description: "Image pull policy"
        default: "always"
        required: false
        type: string
      config-folder:
        description: "Path to folder containing config files"
        required: false
        type: string
      debug:
        description: "Enable debug logging"
        default: ""
        required: false
        type: string
      credentials-secret-name:
        description: "Name of the secret containing the credentials"
        default: "UNIVERSAL_AIRGAPPER_CREDS"
        required: false
        type: string
    secrets:
      GHCR_PAT:
        required: true
      AIRGAPPER_CREDENTIALS:
        description: "Credential YAML consumed by airgapper"
        required: false

# Restrict permissions to the minimum needed.
permissions:
  contents: read

jobs:
  airgapper:
    name: ${{ inputs.job-name || 'airgapper' }}
    runs-on: ubuntu-latest
    container:
      image: ${{ inputs.image_registry }}/${{ inputs.image_name }}:${{ inputs.image_tag }}
      options: --pull=${{ inputs.image_pull_policy || 'always' }}
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GHCR_PAT }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6

      - name: Validate configuration
        shell: sh
        run: |
          config_folder="${CONFIG_FOLDER:-$GITHUB_WORKSPACE}"
          if [ ! -d "$config_folder" ]; then
            echo "::error::Config folder does not exist: $config_folder"
            exit 2
          fi

          config_files=$(find "$config_folder" -maxdepth 1 -type f \( \
            -name '*.config.airgapper.yaml' -o -name '*.config.airgapper.yml' \) -print)
          if [ -z "$config_files" ]; then
            echo "::error::No *.config.airgapper.yaml or *.config.airgapper.yml files found in $config_folder"
            exit 2
          fi

          echo "Using airgapper configuration:"
          printf '%s\n' "$config_files"
        env:
          CONFIG_FOLDER: ${{ inputs.config-folder }}

      - name: Run Universal Airgapper
        shell: sh
        run: |
          credentials_file="${RUNNER_TEMP}/airgapper-credentials.yaml"
          trap 'rm -f "$credentials_file"' EXIT
          umask 077
          if [ -z "$AIRGAPPER_CREDENTIALS" ]; then
            echo "::error::The airgapper credentials secret is empty"
            exit 2
          fi
          printf '%s' "$AIRGAPPER_CREDENTIALS" > "$credentials_file"

          set -- /airgapper sync \
            --config "${CONFIG_FOLDER:-$GITHUB_WORKSPACE}" \
            --credentials "$credentials_file"
          if [ "$DEBUG" = "--debug" ]; then
            set -- "$@" --debug
          elif [ -n "$DEBUG" ]; then
            echo "::error::The debug input must be empty or --debug"
            exit 2
          fi
          "$@"
        env:
          CONFIG_FOLDER: ${{ inputs.config-folder }}
          DEBUG: ${{ inputs.debug }}
          AIRGAPPER_CREDENTIALS: ${{ secrets.AIRGAPPER_CREDENTIALS || secrets[inputs.credentials-secret-name] }}
