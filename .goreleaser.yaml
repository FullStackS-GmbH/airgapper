version: 2
project_name: airgapper

builds:
  - id: airgapper
    main: ./cmd/airgapper
    binary: airgapper
    env:
      - CGO_ENABLED=0
    flags:
      - -trimpath
    tags:
      - containers_image_openpgp
      - exclude_graphdriver_btrfs
      - exclude_graphdriver_devicemapper
      - exclude_graphdriver_overlay
    ldflags:
      - -s -w -X main.version={{ .Tag }} -X main.commit={{ .ShortCommit }} -X main.date={{ .Date }}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64

checksum:
  name_template: "{{ .ProjectName }}_{{ .Version }}_checksums.txt"
  algorithm: sha256
  split: false
  disable: false

sboms:
  - documents:
      - "{{ .Binary }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}.cdx.sbom"
    cmd: syft
    args: [ "$artifact", "-o", "cyclonedx-json=$document" ]
    artifacts: binary

source:
  enabled: false

archives:
  - id: airgapper
    formats: [ "tar.gz" ]
    meta: false
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    wrap_in_directory: true
    strip_binary_directory: false
    allow_different_binary_count: true
